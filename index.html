<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brenneman Recipe Masterlist</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="320x320" href="icon-320.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brenneman Cookbook">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #1A1410;
  }
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* iOS portrait lock fallback — rotates content back when device is landscape */
  @media screen and (orientation: landscape) and (max-width: 1024px) {
    body {
      transform: rotate(-90deg);
      transform-origin: left top;
      width: 100vh;
      height: 100vw;
      overflow: hidden;
      position: absolute;
      top: 100%;
      left: 0;
    }
  }
</style>
</head>
<body>
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbw10tEQCp4iQs5TmCcxsQ_Pv24NeWYv-7lwHsEW9hYe55kE_gETVYdizkMzUTJHzGO9/exec"
    title="Brenneman Recipe Masterlist"
    allow="clipboard-write"
  ></iframe>

  <script>
    // Lock to portrait using Screen Orientation API (Android Chrome, some browsers)
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(() => {
        // Silently fail — CSS fallback handles it
      });
    }
  </script>
</body>
</html>
